# ===================================================================
#  URL Shortener - Application Configuration
#  File: src/main/resources/application.properties
# ===================================================================

# -- Server ---------------------------------------------------------
server.port=8080

# -- Application Name -----------------------------------------------
spring.application.name=url-shortener

# -- MySQL Database -------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/url_shortener_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# -- Hibernate / JPA ------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# -- Static Resources (serves index.html from /static folder) -------
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# -- Redis Cache ----------------------------------------------------
spring.data.redis.host=localhost
spring.data.redis.port=6379

# -- Logging --------------------------------------------------------
logging.level.com.project.urlshortener=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# -- Swagger / OpenAPI ----------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.enabled=true

# -- Actuator (Health Checks) ---------------------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always